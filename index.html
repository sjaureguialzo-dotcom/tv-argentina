<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV Argentina HD</title>
    <style>
        :root {
            --ln-blue: #0056b3;
            --glass: rgba(0, 0, 0, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            color: white; 
            font-family: Arial, sans-serif;
            overflow: hidden; 
            height: 100vh;
        }

        /* Video Container */
        #video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        
        iframe { width: 100%; height: 100%; pointer-events: none; border: none; }

        /* Channel Info Overlay */
        #channel-info {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        #channel-name {
            font-size: 24px;
            font-weight: bold;
            background: var(--glass);
            padding: 12px 35px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Sidebar UI */
        #ui-wrapper {
            position: fixed;
            right: 20px; 
            top: 0; 
            height: 100%; 
            width: 100px;
            display: none; /* Controlled by JS */
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            z-index: 10;
        }

        .btn-nav {
            width: 60px; height: 60px; margin: 10px 0;
            border-radius: 50%; border: 2px solid white;
            background: var(--glass); color: white;
            font-size: 24px; cursor: pointer;
        }

        .btn-nav:focus {
            background: var(--ln-blue);
            transform: scale(1.2);
            outline: none;
        }

        /* LN Logo Button */
        #ln-link {
            margin-top: 25px;
            display: block;
            outline: none;
        }
        
        #ln-link img {
            width: 70px; 
            height: 70px;
            border-radius: 50%;
            border: 2px solid transparent;
            display: block;
        }

        #ln-link:focus img {
            border-color: white;
            transform: scale(1.1);
        }

        /* Start Button */
        #start-overlay {
            position: fixed; inset: 0; background: #111;
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }

        #start-btn {
            padding: 20px 50px; font-size: 20px; font-weight: bold;
            background: var(--ln-blue); color: white; border: none;
            border-radius: 10px; cursor: pointer;
        }

        .fade-out { opacity: 0; }
    </style>
</head>
<body>

<div id="start-overlay">
    <button id="start-btn" onclick="initPlayer()">ENTRAR A TV</button>
</div>

<div id="channel-info" class="fade-out">
    <div id="channel-name">Cargando...</div>
</div>

<div id="video-container">
    <div id="player"></div>
</div>

<div id="ui-wrapper">
    <button class="btn-nav" id="btn-up" onclick="changeChannel(-1)">▲</button>
    <button class="btn-nav" id="btn-down" onclick="changeChannel(1)">▼</button>
