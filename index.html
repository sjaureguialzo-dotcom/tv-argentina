<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV Argentina</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #111; font-family: Arial, sans-serif; color: white; }

        #screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 0;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 30px;
            color: #e53935;
            letter-spacing: 2px;
        }

        #channel-display {
            font-size: 36px;
            font-weight: bold;
            background: rgba(255,255,255,0.08);
            border: 2px solid #444;
            border-radius: 12px;
            padding: 20px 50px;
            margin-bottom: 10px;
            min-width: 400px;
            text-align: center;
        }

        #hint {
            font-size: 16px;
            color: #888;
            margin-bottom: 40px;
        }

        #btn-row {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }

        .btn {
            width: 70px; height: 70px; font-size: 32px;
            background: rgba(255,255,255,0.1); border: 2px solid #555;
            color: white; border-radius: 50%; cursor: pointer; outline: none;
            display: flex; align-items: center; justify-content: center;
        }
        .btn:focus { background: #e53935; border-color: white; }
        .btn:active { background: #b71c1c; }

        #play-btn {
            padding: 18px 50px; font-size: 22px; font-weight: bold;
            background: #e53935; color: white; border: none;
            border-radius: 10px; cursor: pointer; letter-spacing: 1px;
        }
        #play-btn:focus { outline: 3px solid white; }
        #play-btn:active { background: #b71c1c; }

        #status {
            margin-top: 20px;
            font-size: 15px;
            color: #aaa;
            min-height: 24px;
            text-align: center;
        }

        #controls-hint {
            position: fixed;
            bottom: 20px;
            font-size: 14px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="screen">
    <h1>TV ARGENTINA</h1>
    <div id="channel-display">14 - TN</div>
    <div id="hint">▲ ▼ to browse &nbsp;|&nbsp; OK or PLAY to watch</div>
    <div id="btn-row">
        <button class="btn" id="btn-up"   onclick="changeChannel(-1)">&#9650;</button>
        <button class="btn" id="btn-down" onclick="changeChannel(1)">&#9660;</button>
    </div>
    <button id="play-btn" onclick="playChannel()">&#9654; WATCH NOW</button>
    <div id="status"></div>
</div>

<div id="controls-hint">Use CH+ / CH- on remote to browse &bull; Press OK or ENTER to watch</div>

<script>
    var channels = [
        { name: "14 - TN",          videoId: "cb12KmMMDJA" },
        { name: "17 - Crónica",      videoId: "JC7f3EUDaqw" },
        { name: "18 - Canal 26",     videoId: "Akf2MWm8vfk" },
        { name: "19 - A24",          videoId: "ArKbAx1K-2U" },
        { name: "24 - Argentina|12", videoId: "JrmCaXL5GZs" },
        { name: "560 - Al Jazeera",  videoId: "gCNeDWCI0vo" },
        { name: "562 - Euronews",    videoId: "pykpO5kQJ98" },
        { name: "575 - France 24",   videoId: "Y-IlMeCCtIg" }
    ];

    var current = 0;

    var KEY_UP          = 38;
    var KEY_DOWN        = 40;
    var KEY_ENTER       = 13;
    var KEY_CH_UP       = 427;
    var KEY_CH_DOWN     = 428;
    var KEY_CH_UP_ALT   = 29460;
    var KEY_CH_DOWN_ALT = 29461;
    var KEY_BACK        = 10009;
    var KEY_PLAY        = 415;

    if (typeof tizen !== "undefined") {
        var keys = ["ChannelUp","ChannelDown","ChUp","ChDown","MediaPlay","Return","Back"];
        for (var i = 0; i < keys.length; i++) {
            try { tizen.tvinputdevice.registerKey(keys[i]); } catch(e) {}
        }
    }

    function updateDisplay() {
        document.getElementById("channel-display").textContent = channels[current].name;
    }

    function changeChannel(dir) {
        current = (current + dir + channels.length) % channels.length;
        updateDisplay();
    }

    function playChannel() {
        var ch = channels[current];
        var url = "https://www.youtube.com/watch?v=" + ch.videoId;
        var status = document.getElementById("status");

        if (typeof tizen !== "undefined") {
            try {
                var appControl = new tizen.ApplicationControl(
                    "http://tizen.org/appcontrol/operation/view",
                    url
                );
                tizen.application.launchAppControl(
                    appControl,
                    null,
                    function() {
                        status.textContent = "Opening: " + ch.name;
                    },
                    function(err) {
                        status.textContent = "Error: " + err.message;
                    }
                );
            } catch(e) {
                status.textContent = "Launch error: " + e.message;
            }
        } else {
            window.open(url, "_blank");
            status.textContent = "Opening in browser: " + ch.name;
        }
    }

    document.addEventListener("keydown", function(e) {
        var c = e.keyCode || e.which;

        if (c === KEY_UP || c === KEY_CH_UP || c === KEY_CH_UP_ALT) {
            e.preventDefault(); changeChannel(-1);
        } else if (c === KEY_DOWN || c === KEY_CH_DOWN || c === KEY_CH_DOWN_ALT) {
            e.preventDefault(); changeChannel(1);
        } else if (c === KEY_ENTER || c === KEY_PLAY) {
            e.preventDefault(); playChannel();
        } else if (c === KEY_BACK) {
            e.preventDefault();
        }
    });

    window.addEventListener("load", function() {
        document.getElementById("btn-up").focus();
    });
</script>
</body>
</html>
