<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV Argentina HD</title>
    <style>
        :root {
            --ln-blue: #0056b3;
            --glass: rgba(0, 0, 0, 0.7);
            --accent: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; 
            height: 100vh;
        }

        /* Video Layer */
        #video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: #000;
        }
        
        iframe { width: 100%; height: 100%; pointer-events: none; border: none; }

        /* Top Channel Indicator */
        #channel-info {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #channel-name {
            font-size: 28px;
            font-weight: 700;
            background: var(--glass);
            backdrop-filter: blur(8px);
            padding: 10px 40px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Right Sidebar Controls */
        #ui-wrapper {
            position: fixed;
            right: 0; top: 0; height: 100%; width: 120px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: linear-gradient(to left, rgba(0,0,0,0.8), transparent);
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .btn-nav {
            width: 65px; height: 65px; margin: 10px 0;
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1); color: white;
            font-size: 28px; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-nav:focus {
            background: var(--ln-blue);
            border-color: white;
            transform: scale(1.2);
            outline: none;
            box-shadow: 0 0 15px var(--ln-blue);
        }

        /* LN Icon Button */
        #ln-link {
            margin-top: 20px;
            text-decoration: none;
            outline: none;
            transition: transform 0.2s;
        }
        
        #ln-link img {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 2px solid transparent;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        #ln-link:focus img {
            transform: scale(1.2);
            border-color: white;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        /* Initial Start Overlay */
        #start-overlay {
            position: fixed; inset: 0; background: #0a0a0a;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 1000;
        }

        #start-btn {
            padding: 20px 60px; font-size: 22px; font-weight: bold;
            background: var(--ln-blue); color: white; border: none;
            border-radius: 50px; cursor: pointer;
            transition: transform 0.2s;
        }

        #start-btn:focus { transform: scale(1.1); outline: 3px solid white; }

        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="start-overlay">
    <button id="start-btn" onclick="initPlayer()">ENTRAR A TV</button>
</div>

<div id="channel-info" class="hidden">
    <div id="channel-name">Cargando...</div>
</div>

<div id="video-container">
    <div id="player"></div>
</div>

<div id="ui-wrapper" class="hidden">
    <button class="btn-nav" id="btn-up" onclick="changeChannel(-1)" title="Canal Anterior">▲</button>
    <button class="btn-nav" id="btn-down" onclick="changeChannel(1)" title="Siguiente Canal">▼</button>
