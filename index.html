<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV Argentina</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #000; font-family: Arial, sans-serif; color: white; overflow: hidden; }

        #channel-name {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            font-size: 28px; font-weight: bold; text-shadow: 2px 2px 6px #000;
            background: rgba(0,0,0,0.7); padding: 10px 30px; border-radius: 8px;
            z-index: 10; white-space: nowrap; display: none;
        }

        #video-area {
            position: fixed; top: 0; left: 0;
            width: calc(100vw - 100px); height: 100vh; background: #000;
        }

        #player { width: 100%; height: 100%; border: none; }

        #controls {
            position: fixed; right: 0; top: 0; width: 100px; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 20px; background: rgba(0,0,0,0.8); z-index: 10;
        }

        .btn {
            width: 60px; height: 60px; font-size: 28px; cursor: pointer;
            background: rgba(255,255,255,0.1); border: 2px solid #444;
            color: white; border-radius: 50%; outline: none;
            display: flex; align-items: center; justify-content: center;
        }
        .btn:focus { background: #e53935; border-color: white; }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; display: flex; align-items: center;
            justify-content: center; z-index: 20;
        }
        #start-btn {
            padding: 20px 40px; font-size: 20px; background: #e53935;
            color: white; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="start-overlay">
    <button id="start-btn" onclick="startViewing()">CLICK TO START WATCHING</button>
</div>

<div id="channel-name"></div>

<div id="video-area">
    <iframe id="player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<div id="controls">
    <button class="btn" onclick="switchChannel(-1)">&#9650;</button>
    <button class="btn" onclick="switchChannel(1)">&#9660;</button>
</div>

<script>
    var channels = [
        { name: "14 - TN",          videoId: "cb12KmMMDJA" },
        { name: "17 - Crónica",      videoId: "JC7f3EUDaqw" },
        { name: "18 - Canal 26",     videoId: "Akf2MWm8vfk" },
        { name: "19 - A24",          videoId: "ArKbAx1K-2U" },
        { name: "24 - Argentina|12", videoId: "JrmCaXL5GZs" },
        { name: "560 - Al Jazeera",  videoId: "gCNeDWCI0vo" },
        { name: "562 - Euronews",    videoId: "pykpO5kQJ98" },
        { name: "575 - France 24",   videoId: "Y-IlMeCCtIg" }
    ];

    var current = 0;

    var KEY_UP          = 38;
    var KEY_DOWN        = 40;
    var KEY_CH_UP       = 427;
    var KEY_CH_DOWN     = 428;
    var KEY_CH_UP_ALT   = 29460;
    var KEY_CH_DOWN_ALT = 29461;
    var KEY_BACK        = 10009;

    if (typeof tizen !== "undefined") {
        var keys = ["ChannelUp","ChannelDown","ChUp","ChDown","Return","Back"];
        for (var i = 0; i < keys.length; i++) {
            try { tizen.tvinputdevice.registerKey(keys[i]); } catch(e) {}
        }
    }

    function loadChannel(index) {
        current = (index + channels.length) % channels.length;
        var ch = channels[current];
        document.getElementById("player").src =
            "https://www.youtube.com/embed/" + ch.videoId +
            "?autoplay=1&mute=0&rel=0&modestbranding=1&playsinline=1";
        document.getElementById("channel-name").textContent = ch.name;
    }

    function switchChannel(dir) {
        loadChannel(current + dir);
    }

    function startViewing() {
        document.getElementById("start-overlay").style.display = "none";
        document.getElementById("channel-name").style.display  = "block";
        loadChannel(0);
    }

    document.addEventListener("keydown", function(e) {
        var c = e.keyCode || e.which;
        if (c === KEY_UP || c === KEY_CH_UP || c === KEY_CH_UP_ALT) {
            e.preventDefault(); switchChannel(-1);
        } else if (c === KEY_DOWN || c === KEY_CH_DOWN || c === KEY_CH_DOWN_ALT) {
            e.preventDefault(); switchChannel(1);
        } else if (c === KEY_BACK) {
            e.preventDefault();
        }
    });
</script>
</body>
</html>
