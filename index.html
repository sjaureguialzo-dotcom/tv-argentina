<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TV Argentina - Numeric Input</title>
    <style>
        /* Previous styles remain same */
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #channel-info { 
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); padding: 15px 40px; border-radius: 50px;
            font-size: 30px; z-index: 100; border: 2px solid #e53935; text-align: center;
        }
        #num-display {
            position: fixed; top: 30px; right: 30px;
            background: #e53935; color: white; padding: 10px 20px;
            font-size: 40px; font-weight: bold; border-radius: 10px;
            display: none; z-index: 101;
        }
        iframe { width: 100vw; height: 100vh; border: none; pointer-events: none; }
    </style>
</head>
<body>

<div id="start-overlay" style="position:fixed; width:100%; height:100%; background:#111; z-index:200; display:flex; align-items:center; justify-content:center;">
    <button id="start-btn" onclick="startViewing()" style="padding:20px 40px; font-size:24px; cursor:pointer;">EMPEZAR A VER</button>
</div>

<div id="channel-info" style="display:none;"><span id="channel-name">Cargando...</span></div>
<div id="num-display"></div>

<iframe id="player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>

<script>
    var channels = [
        { id: "14", name: "14. TN", videoId: "cb12KmMMDJA" },
        { id: "17", name: "17. Crónica", videoId: "JC7f3EUDaqw" },
        { id: "18", name: "18. Canal 26", videoId: "Akf2MWm8vfk" },
        { id: "19", name: "19. A24", videoId: "ArKbAx1K-2U" },
        { id: "24", name: "24. Argentina|12", videoId: "JrmCaXL5GZs" },
        { id: "560", name: "560. Al Jazeera", videoId: "gCNeDWCI0vo" },
        { id: "562", name: "562. Euronews", videoId: "pykpO5kQJ98" },
        { id: "575", name: "575. France 24", videoId: "Y-IlMeCCtIg" }
    ];

    var currentIndex = 0;
    var inputBuffer = "";
    var inputTimer = null;

    var KEY_CODES = {
        CH_UP: 427, CH_DOWN: 428, CH_UP_ORSAY: 33, CH_DOWN_ORSAY: 34,
        UP: 38, DOWN: 40, ENTER: 13, RETURN: 10009
    };

    function startViewing() {
        document.getElementById("start-overlay").style.display = "none";
        document.getElementById("channel-info").style.display = "block";
        loadChannel(0);
        document.body.focus();
    }

    function loadChannel(index) {
        currentIndex = (index + channels.length) % channels.length;
        var channel = channels[currentIndex];
        document.getElementById("player").src = "https://www.youtube.com/embed/" + channel.videoId + "?autoplay=1&controls=0&enablejsapi=1";
        document.getElementById("channel-name").textContent = channel.name;
        
        // Visual feedback
        var info = document.getElementById("channel-info");
        info.style.display = "block";
        setTimeout(() => { info.style.opacity = "0.3"; }, 4000);
    }

    function jumpToChannelId(id) {
        var foundIndex = channels.findIndex(c => c.id === id);
        if (foundIndex !== -1) {
            loadChannel(foundIndex);
        } else {
            console.log("Channel " + id + " not found.");
        }
    }

    function handleNumericInput(num) {
        clearTimeout(inputTimer);
        inputBuffer += num;
        
        var display = document.getElementById("num-display");
        display.textContent = inputBuffer;
        display.style.display = "block";

        // Wait 2 seconds for next digit, then execute jump
        inputTimer = setTimeout(() => {
            jumpToChannelId(inputBuffer);
            inputBuffer = "";
            display.style.display = "none";
        }, 1800);
    }

    document.addEventListener("keydown", function(e) {
        var code = e.keyCode || e.which;

        // Numeric Keys (0-9) support for both PC and Tizen/Legacy
        // KeyCodes 48-57 are numbers 0-9. Tizen sometimes uses 256+ range.
        if (code >= 48 && code <= 57) {
            handleNumericInput(code - 48);
        } else if (code >= 256 && code <= 265) { // Tizen Virtual Number keys
            handleNumericInput(code - 256);
        }

        switch(code) {
            case KEY_CODES.CH_UP:
            case KEY_CODES.CH_UP_ORSAY:
            case KEY_CODES.UP:
                e.preventDefault();
                loadChannel(currentIndex - 1);
                break;
            case KEY_CODES.CH_DOWN:
            case KEY_CODES.CH_DOWN_ORSAY:
            case KEY_CODES.DOWN:
                e.preventDefault();
                loadChannel(currentIndex + 1);
                break;
            case KEY_CODES.ENTER:
                if (document.getElementById("start-overlay").style.display !== "none") {
                    startViewing();
                }
                break;
            case KEY_CODES.RETURN:
                e.preventDefault();
                break;
        }
    });

    // Register numeric keys for Tizen Web Apps
    if (typeof tizen !== 'undefined') {
        tizen.tvinputdevice.registerKey('ChUp');
        tizen.tvinputdevice.registerKey('ChDown');
        for (var i=0; i<=9; i++) { tizen.tvinputdevice.registerKey(i.toString()); }
    }

    window.onload = function() { document.getElementById("start-btn").focus(); };
</script>
</body>
</html>
